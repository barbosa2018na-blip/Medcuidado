name: Criar APK do MedCuidado

on: [push]

jobs:
  construir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Listar arquivos
        run: ls -la

      - name: Descompactar projeto
        run: unzip MedCuidadoAndroid.zip

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Permissao ao Gradle
        run: chmod +x MedCuidadoApp/gradlew

      - name: Compilar APK
        run: cd MedCuidadoApp && ./gradlew assembleDebug

      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: MedCuidadoApp/app/build/outputs/apk/debug/app-debug.apk
